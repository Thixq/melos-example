name: melos_example
description: A starting point for Dart libraries or applications.
version: 1.0.0

repository: https://github.com/Thixq/melos-example

environment:
  sdk: ^3.11.5

workspace:
  - packages/*

dev_dependencies:
  melos: ^7.0.0

melos:
  ide:
    intellij:
      enabled: false
  sdkPath: .fvm/flutter_sdk
  command:
    bootstrap:
      runPubGetInParallel: true
      hooks:
        post: |
          melos exec --depends-on="build_runner" -- "dart run build_runner build --delete-conflicting-outputs"
    version:
      linkToCommits: true
      workspaceChangelog: true
      changelogCommitBodies:
        include: true
  scripts:
    test:smart:
      run: melos exec --fail-fast --dir-exists="test" --diff=main --include-dependents -- "dart test"
      description: "Sadece main branch'ine göre değişen ve onlara bağımlı olan paketlerin testlerini çalıştırır."